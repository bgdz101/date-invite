<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Запрошення для Наташі 💌</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #ffdde1, #ee9ca7, #ffc3a0);
    background-size: 400% 400%;
    animation: gradientShift 12s ease infinite;
    overflow: hidden;
    position: relative;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .heart {
    position: absolute;
    top: -10%;
    font-size: 24px;
    opacity: 0.7;
    animation: fall linear infinite;
    user-select: none;
  }

  @keyframes fall {
    to { transform: translateY(110vh) rotate(360deg); opacity: 0.2; }
  }

  .card {
    background: rgba(255, 255, 255, 0.92);
    border-radius: 24px;
    padding: 40px 32px;
    max-width: 420px;
    width: 90%;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    position: relative;
    z-index: 2;
    animation: popIn 0.6s ease;
  }

  @keyframes popIn {
    from { transform: scale(0.85); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  h1 {
    color: #d63384;
    font-size: 1.6rem;
    margin-bottom: 10px;
  }

  p.subtitle {
    color: #7a4a55;
    margin-bottom: 24px;
    line-height: 1.5;
  }

  .date-picker-wrap {
    margin-bottom: 24px;
  }

  .date-picker-wrap label {
    display: block;
    margin-bottom: 8px;
    color: #a8475c;
    font-weight: 600;
    font-size: 0.95rem;
  }

  input[type="date"] {
    padding: 10px 14px;
    border-radius: 12px;
    border: 2px solid #f3a6b8;
    font-size: 1rem;
    color: #7a4a55;
    outline: none;
    background: #fff7f8;
  }

  .buttons {
    position: relative;
    display: flex;
    justify-content: center;
    gap: 20px;
    height: 60px;
  }

  button {
    border: none;
    border-radius: 14px;
    padding: 14px 28px;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  #yesBtn {
    background: linear-gradient(135deg, #ff6f91, #ff9472);
    color: white;
    box-shadow: 0 8px 20px rgba(255,111,145,0.4);
  }

  #yesBtn:hover {
    transform: translateY(-2px) scale(1.05);
  }

  #noBtn {
    background: #f1f1f1;
    color: #888;
    position: fixed;
    z-index: 50;
    transition: left 0.18s cubic-bezier(.34,1.56,.64,1), top 0.18s cubic-bezier(.34,1.56,.64,1), transform 0.18s ease;
  }

  .surprise {
    display: none;
    margin-top: 8px;
  }

  .surprise.show {
    display: block;
    animation: popIn 0.5s ease;
  }

  .surprise h2 {
    color: #d63384;
    margin-bottom: 10px;
  }

  .surprise p {
    color: #7a4a55;
    line-height: 1.6;
  }

  .confirmed-date {
    margin-top: 14px;
    font-weight: 700;
    color: #c2185b;
  }

  .emoji-row {
    font-size: 1.8rem;
    margin-top: 12px;
  }

  .hidden { display: none; }
</style>
</head>
<body>

<div id="hearts"></div>

<div class="card">
  <div id="question">
    <h1>Наташо, привіт! 💕</h1>
    <p class="subtitle">У мене до тебе одне дуже важливе запитання...<br>Підеш зі мною на побачення?</p>

    <div class="date-picker-wrap">
      <label for="dateInput">Обери дату, яка тобі підходить:</label>
      <input type="date" id="dateInput">
    </div>

    <div class="buttons">
      <button id="yesBtn" onclick="sayYes()">Так 😍</button>
      <button id="noBtn" onclick="dodge()">Ні</button>
    </div>
  </div>

  <div id="surprise" class="surprise">
    <h2>Ура! 🎉</h2>
    <p>Я дуже чекав(ла) на твоє "так"!<br>
       Це буде неймовірний вечір — і я вже придумав(ла), як зробити його особливим для тебе.</p>
    <p class="confirmed-date" id="confirmedDate"></p>
    <div class="emoji-row">🌹🍷🎶✨</div>
  </div>
</div>

<script>
  // плаваючі сердечка на фоні
  const heartsContainer = document.getElementById('hearts');
  const heartSymbols = ['💖','💕','💗','💝','🌸'];
  for (let i = 0; i < 25; i++) {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.animationDuration = (6 + Math.random() * 8) + 's';
    heart.style.animationDelay = (Math.random() * 8) + 's';
    heart.style.fontSize = (16 + Math.random() * 20) + 'px';
    heartsContainer.appendChild(heart);
  }

  // кнопка "Ні" тікає від курсора/дотику
  const noBtn = document.getElementById('noBtn');
  let dodgeCount = 0;
  function dodge() {
    const maxX = window.innerWidth - noBtn.offsetWidth - 16;
    const maxY = window.innerHeight - noBtn.offsetHeight - 16;
    const x = 8 + Math.random() * maxX;
    const y = 8 + Math.random() * maxY;
    const rotate = (Math.random() - 0.5) * 60;

    noBtn.style.left = x + 'px';
    noBtn.style.top = y + 'px';
    noBtn.style.transform = `rotate(${rotate}deg) scale(${1 + Math.random() * 0.15})`;

    dodgeCount++;
    if (dodgeCount > 6) {
      noBtn.textContent = ['Ні?? 😜','Спробуй ще!','Ха, не вийде!','Ну дааавай 😏'][dodgeCount % 4];
    }
  }
  noBtn.addEventListener('mouseenter', dodge);
  noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); dodge(); });
  noBtn.addEventListener('click', (e) => { e.preventDefault(); dodge(); });

  function sayYes() {
    document.getElementById('question').style.display = 'none';
    const surprise = document.getElementById('surprise');
    surprise.classList.add('show');

    const dateVal = document.getElementById('dateInput').value;
    if (dateVal) {
      const d = new Date(dateVal);
      const formatted = d.toLocaleDateString('uk-UA', { day: 'numeric', month: 'long', year: 'numeric' });
      document.getElementById('confirmedDate').textContent = 'Зустрічаємось ' + formatted + '! 📅';
    }
  }
</script>

</body>
</html>
